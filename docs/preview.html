<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>FullADDMAX-mcp — Panel</title>
<style>
  :root {
    --bg: #0F0F1E;
    --card: #1A1A2E;
    --text: #E8E8F0;
    --muted: #8888A0;
    --accent: #9D2BFF;
    --accent2: #22C6FF;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    min-height: 100vh;
  }
  header {
    text-align: center;
    padding: 32px 16px 16px;
  }
  header h1 { margin: 0; font-size: 28px; }
  header h1 span { color: var(--accent); }
  header p {
    margin: 8px 0 0;
    color: var(--muted);
    font-size: 14px;
  }
  main {
    max-width: 1320px;
    margin: 0 auto;
    padding: 0 16px 48px;
  }
  .panel-frame {
    background: var(--card);
    border-radius: 12px;
    padding: 8px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.4);
  }
  .panel-frame img { display: block; width: 100%; height: auto; }
  footer {
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    padding: 0 16px 32px;
  }
  code {
    background: var(--card);
    padding: 2px 6px;
    border-radius: 4px;
    font-family: ui-monospace, monospace;
    font-size: 12px;
  }
</style>
</head>
<body>
  <header>
    <h1>FullADDMAX-mcp <span>·</span> Panel</h1>
    <p>Static SVG snapshot of the running server.  One file, one page.</p>
  </header>
  <main>
    <div class="panel-frame">
      <img src="panel.svg" alt="FullADDMAX-mcp panel snapshot">
    </div>
  </main>
  <footer>
    Generated by <code>fulladdmax-mcp panel</code> ·
    3 cards (Server / LLM / Agent Tools) ·
    single dark theme
  </footer>
</body>
</html>
